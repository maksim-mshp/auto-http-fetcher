services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_started

    networks:
      - fetcher-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: auto-http-fetcher-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auto-http-fetcher
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fetcher-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto-http-fetcher-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - fetcher-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: auto-http-fetcher-kafka
    expose:
      - "9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - fetcher-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  analytics:
    image: analytics:latest
    container_name: auto-http-fetcher-analytics
    build:
      context: .
      dockerfile: cmd/analytics/Dockerfile
    expose:
      - "8080"
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/auto-http-fetcher?sslmode=disable
      REDIS_URL: redis:6379
      ANALYTICS_PORT: :8080
      ANALYTICS_TTL: 60
      ENV: Development
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fetcher-network
    restart: unless-stopped

  fetcher:
    image: fetcher:latest
    container_name: auto-http-fetcher-fetcher
    build:
      context: .
      dockerfile: cmd/fetcher/Dockerfile
    expose:
      - "50051"
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/auto-http-fetcher?sslmode=disable
      GRPC_PORT: :50051
      ENV: Development
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - fetcher-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "echo | nc localhost 50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    image: scheduler:latest
    container_name: auto-http-fetcher-scheduler
    build:
      context: .
      dockerfile: cmd/scheduler/Dockerfile
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/auto-http-fetcher?sslmode=disable
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_SCHEDULE_REQUEST: schedule-requests
      KAFKA_CONSUMER_GROUP: auto-http-fetcher-scheduler
      FETCHER_GRPC_ADDR: fetcher:50051
      ENV: Development
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fetcher:
        condition: service_started
    networks:
      - fetcher-network
    restart: unless-stopped

  modules:
    image: modules:latest
    container_name: auto-http-fetcher-modules
    build:
      context: .
      dockerfile: cmd/modules/Dockerfile
    expose:
      - "8090"
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/auto-http-fetcher?sslmode=disable
      MODULES_PORT: :8090
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_SCHEDULE_REQUEST: schedule-requests
      JWT_SECRET: development-secret
      JWT_TTL: 5h
      ENV: Development
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      scheduler:
        condition: service_started
    networks:
      - fetcher-network
    restart: unless-stopped

  users:
    image: users:latest
    container_name: auto-http-fetcher-users
    build:
      context: .
      dockerfile: cmd/users/Dockerfile
    expose:
      - "8095"
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/auto-http-fetcher?sslmode=disable
      USERS_PORT: :8095
      JWT_SECRET: development-secret
      JWT_TTL: 5h
      ENV: Development
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - fetcher-network
    restart: unless-stopped

  gateway:
    image: gateway:latest
    container_name: auto-http-fetcher-gateway
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    environment:
      FETCHER_ADDR: fetcher:50051
      ANALYTICS_ADDR: analytics:8080
      USERS_ADDR: users:8095
      MODULES_ADDR: modules:8090
    expose:
      - "8081"
    depends_on:
      users:
        condition: service_started
      modules:
        condition: service_started
      fetcher:
        condition: service_started
    networks:
      - fetcher-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: cmd/migrations/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fetcher-network

networks:
  fetcher-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
