syntax = "proto3";

package fetcher.v1;

option go_package = "auto-http-fetcher/proto/fetcher/v1";

service FetcherService {
    rpc Fetch(FetchRequest) returns (FetchResponse);
}

message FetchRequest {
    int64 webhook_id = 1;
    string type = 2;
}

message FetchResponse {
    int64 attempt = 1;
}